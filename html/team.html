
<div class="row">

	<div class="col-8">

		<a id="{{owner_id}}"></a>

		<table class="table table-striped table-bordered table-sm">
			<thead>
				<tr>
					<th colspan="9">{{FNF}} - {{team_name}}</th>
				</tr>
				<tr><th colspan="9">{{place}} place, {{season}}</th></tr>

				<tr>
					<th>POS</th>
					<th>Name</th>
					<th class="text-center">Team</th>
					<th class="text-center">Salary</th>
					<th class="text-center">Pk</th>
					<th class="text-center">Pts</th>
					<th class="text-center">Y'day</th>
					<th class="text-center">Rec</th>
					<th class="text-center">Val</th>
				</tr>
			</thead>

			<tbody>

				{{active_players}}

				<tr style='text-align: center;{{show_bench}}'>
					<td colspan = '9'>Benched players</td>
				</tr>

				{{benched_players}}

				<tr>

					<td colspan="3" align="right"><b>Bank: ${{bank}}</td>
					<td align="right"><b>${{salary}}</b></td>
					<td></td>
					<td align="right"><b>{{points}}</b></td>
					<td align="right"><b>{{yesterday}}</b></td>
					<td align="right"><b>{{recent}}</b></td>
					<td></td>
				</tr>
			</tbody>
		</table>
	</div>

	<div class="col-4">
		<a href="#top">back to top</a>
	</div>
</div>
