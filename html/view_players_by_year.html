<div class="row">
	<div class="col">
		<h3 style = "margin-top: 10px">Players {{SEASON}}</h3>
	</div>

	<div class="col">
		<a href='{{SELF_HREF}}'><button type="button" class="btn btn-primary">{{SELF_DESC}}</button></a>
	</div>
</div>

<table id="my_data_table" class="table table-striped table-bordered table-sm" cellspacing="0" width="100%">

	<thead>
		<tr>
			<th class="th-sm" style="text-align: center">Pos<i class="fa fa-sort float-right" aria-hidden="true"></i></th>
			<th class="th-sm" style="text-align: center">Name<i class="fa fa-sort float-right" aria-hidden="true"></i></th>
			<th class="th-sm" style="text-align: center">Team<i class="fa fa-sort float-right" aria-hidden="true"></i></th>
			<th class="th-sm" style="text-align: center">Salary<i class="fa fa-sort float-right" aria-hidden="true"></i></th>
			<th class="th-sm" style="text-align: center">Pts<i class="fa fa-sort float-right" aria-hidden="true"></i></th>
			<th class="th-sm" style="text-align: center">Val<i class="fa fa-sort float-right" aria-hidden="true"></i></th>
			<th class="th-sm" style="text-align: center">Drafted<i class="fa fa-sort float-right" aria-hidden="true"></i></th>
			<th class="th-sm" style="text-align: center">Acquired<i class="fa fa-sort float-right" aria-hidden="true"></i></th>
			<th class="th-sm" style="text-align: center">Total<i class="fa fa-sort float-right" aria-hidden="true"></i></th>
		</tr>
	</thead>

	<tbody>
		{{BODY}}
	</tbody>

	<tfoot>
		<tr>
			<th>Pos</th><th>Name</th><th>Team</th><th>Salary</th><th>Pts</th><th>Val</th><th>Drafted</th><th>Acquired</th><th>Total</th>
		</tr>
	</tfoot>

</table>

<script>
	$(document).ready(function () {
		$('#all_players_by_year').DataTable();
		$('.dataTables_length').addClass('bs-select');
	});
</script>
