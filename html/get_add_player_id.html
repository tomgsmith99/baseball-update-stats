
	<div class="row">
		<div class="col-4">
			<h3 style="margin-top:10px">Make a trade</h3>

			<table class='table table-sm'>

				<tr><td>Owner:</td><td align="right">{{owner_fnf}}</td></tr>

				<tr><td>Player to drop:</td><td align="right">{{drop_player_fnf}}</td></tr>

				<tr><td>Dropped player salary:</td><td align="right">${{drop_player_salary}}</td></tr>

				<tr><td>Bank:</td><td align="right">${{bank}}</td></tr>

				<tr><td>Budget for new player:</td><td align="right">${{budget}}</td></tr>

			</table>
		</div>
	</div>

	<div class="row">

		<div class="col-6">

			<h4>Which player do you want to add?</h4>

			<table class='table table-sm'>
				<tr><th>player</th><th>team</th><th style="text-align:right">salary</th><th style="text-align:right">points</th><th></th></tr>

				{{players}}

			</table>

		</div>

	</div>
